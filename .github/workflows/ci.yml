name: Python CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - run: uv sync --all-extras --group dev
      - run: uv run ruff check src tests examples scripts
      - run: uv run ruff format --check src tests examples scripts
      - run: uv run pytest -q
      - if: matrix.python-version == '3.12'
        run: |
          uv build
          uvx twine check dist/*
          WHEEL="$(find dist -name '*.whl' -print -quit)"
          uv run --isolated --no-project --with "$WHEEL" portallib --version
          printf '%s\n' \
            'recipe_version = 1' \
            'kind = "evaluate"' \
            'artifact = "example/artifact"' \
            '' \
            '[dataset]' \
            'repo_id = "example/tasks"' \
            '' \
            '[base]' \
            'model_id = "example/base"' \
            | uv run --isolated --no-project --with "$WHEEL" portallib validate --config -
